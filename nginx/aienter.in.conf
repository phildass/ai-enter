# Nginx configuration for aienter.in
# Standalone, best-practice configuration for the AI Enter Next.js application.
#
# DEPLOYMENT WORKFLOW:
#   Step 1 — Bootstrap (HTTP only, before SSL cert exists):
#     Use the HTTP-only server block below (lines marked [BOOTSTRAP]).
#     Certbot needs Nginx to be running on port 80 to complete the ACME challenge.
#
#   Step 2 — Issue certificate:
#     sudo certbot --nginx -d aienter.in -d www.aienter.in
#     Certbot will add the HTTPS server block and HTTP→HTTPS redirect automatically.
#
#   Step 3 — Add http2 and _next/static (post-certbot):
#     After Certbot writes the HTTPS server block, add the following two lines
#     inside the HTTPS server block (alongside the existing listen 443 ssl; line):
#
#       http2 on;
#
#     Also ensure the location /_next/static/ block (see below) is present in
#     the HTTPS server block so that static assets are served directly from disk
#     rather than being proxied, preventing any UI layout distortion.
#
# Place this file at: /etc/nginx/sites-available/aienter.in
# Then enable it: sudo ln -s /etc/nginx/sites-available/aienter.in /etc/nginx/sites-enabled/

# [BOOTSTRAP] HTTP-only server block.
# Certbot replaces this with a redirect and adds a full HTTPS server block.
server {
    listen 80;
    listen [::]:80;
    server_name aienter.in www.aienter.in;

    # Serve Next.js static assets directly from disk for maximum performance.
    # This block must also be present in the HTTPS server block after Certbot runs.
    location /_next/static/ {
        alias /var/www/ai-enter/.next/static/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3040;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Required for Next.js to detect HTTPS and avoid Mixed Content errors
        # during Razorpay checkout. Certbot preserves this header when it
        # moves the location block into the new HTTPS server block.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

