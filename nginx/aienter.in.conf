# Nginx configuration for aienter.in
# Place this file at: /etc/nginx/sites-available/aienter.in
# Then enable it: sudo ln -s /etc/nginx/sites-available/aienter.in /etc/nginx/sites-enabled/

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name aienter.in www.aienter.in;

    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name aienter.in www.aienter.in;

    # SSL certificate issued by Let's Encrypt via Certbot
    ssl_certificate /etc/letsencrypt/live/aienter.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aienter.in/privkey.pem;

    # Recommended SSL settings managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3040;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
