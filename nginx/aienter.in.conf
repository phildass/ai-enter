# Nginx bootstrap configuration for aienter.in
# Deploy this file BEFORE running Certbot so that Nginx can start without a certificate.
# Certbot (--nginx) will add the HTTPS server block and redirect once the certificate is issued.
#
# Place this file at: /etc/nginx/sites-available/aienter.in
# Then enable it: sudo ln -s /etc/nginx/sites-available/aienter.in /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name aienter.in www.aienter.in;

    location / {
        proxy_pass http://127.0.0.1:3040;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Required for Next.js to detect HTTPS and avoid Mixed Content errors
        # during Razorpay checkout. Certbot preserves this header when it
        # moves the location block into the new HTTPS server block.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
